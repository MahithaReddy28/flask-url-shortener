<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>
</head>
<body>

    <h1>Simple URL Shortener</h1>

    <form method="POST">

        <input type="text"
               name="url"
               placeholder="Enter URL"
               required>

        <button type="submit">
            Shorten
        </button>

    </form>

    {% if short_url %}

        <h3>Short URL:</h3>

        <a href="{{ short_url }}">
            {{ short_url }}
        </a>

    {% endif %}

</body>
</html>
